<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" aria-label="AdvoVisions">
  <!--
    AdvoVisions brand mark — "ag" monogram approximation.
    Silhouette roughly traced from the reference. Replace this file
    with the official vector export for pixel-perfect fidelity.
  -->
  <g fill="#2437c8">

    <!-- ====================== 'g' ====================== -->
    <!-- upper crossbar extending to the right edge -->
    <path d="M 216 0
             L 388 0
             C 394 0, 400 6, 400 12
             L 400 32
             C 400 40, 394 46, 386 46
             L 216 46
             Z" />

    <!-- right stem going down from the crossbar -->
    <path d="M 356 32
             L 400 32
             L 400 232
             C 400 256, 380 270, 358 270
             L 310 270
             Z" />

    <!-- the large round bowl of the 'g' -->
    <path d="M 200 100
             C 200 50, 250 18, 310 18
             C 360 18, 400 58, 400 110
             L 400 128
             C 400 180, 360 210, 308 210
             L 280 210
             C 234 210, 200 180, 200 136
             Z" />

    <!-- descender hook -->
    <path d="M 244 200
             C 244 230, 270 252, 302 252
             L 330 252
             C 352 252, 366 240, 368 224
             L 368 208
             L 288 208
             Z" />

    <!-- the white teardrop counter inside the 'g' (slanted crescent) -->
    <path fill="#ffffff"
          d="M 272 50
             C 310 42, 354 66, 356 110
             C 354 150, 324 170, 290 164
             C 260 156, 248 128, 254 100
             C 258 76, 262 58, 272 50
             Z" />

    <!-- ====================== 'a' ====================== -->
    <!-- main body: thick rounded rectangle with curved top-left -->
    <path d="M 8 128
             C 8 68, 52 24, 112 24
             L 164 24
             C 200 24, 226 50, 226 86
             L 226 248
             C 226 266, 210 280, 192 280
             L 78 280
             C 40 280, 8 248, 8 210
             Z" />

    <!-- white teardrop counter inside the 'a' (leaning right) -->
    <path fill="#ffffff"
          d="M 72 62
             C 120 44, 178 66, 182 110
             C 180 158, 138 178, 104 166
             C 76 156, 62 128, 66 100
             C 68 80, 68 70, 72 62
             Z" />

    <!-- the signature dot at the bottom-left of the 'a' -->
    <circle cx="110" cy="252" r="22" fill="#2437c8" />
    <!-- small white ring around the dot so it reads against the body -->
    <circle cx="110" cy="252" r="32" fill="#ffffff" />
    <circle cx="110" cy="252" r="22" fill="#2437c8" />

  </g>
</svg>
