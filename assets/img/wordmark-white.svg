<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 120" aria-label="AdvoVisions" preserveAspectRatio="xMinYMid meet">
  <defs>
    <linearGradient id="chromeW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#e0e5f5"/>
      <stop offset="100%" stop-color="#b7bfd8"/>
    </linearGradient>
  </defs>
  <!-- baseline cyan light line -->
  <line x1="6" y1="100" x2="614" y2="100" stroke="#5aa9ff" stroke-width="2" opacity="0.9"/>
  <!-- 'A' bright blue, filled -->
  <text x="6" y="92"
        font-family="'Helvetica Neue', Helvetica, Arial, 'Liberation Sans', sans-serif"
        font-weight="300"
        font-size="108" letter-spacing="-3"
        fill="#5aa9ff">A</text>
  <!-- 'dvoVisions' chrome gradient -->
  <text x="88" y="92"
        font-family="'Helvetica Neue', Helvetica, Arial, 'Liberation Sans', sans-serif"
        font-weight="300"
        font-size="108" letter-spacing="-3"
        fill="url(#chromeW)">dvoVisions</text>
</svg>
