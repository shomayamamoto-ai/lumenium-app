name: AI News Collector

on:
  schedule:
    # 00:05 UTC = 09:05 JST
    - cron: '5 0 * * *'
  workflow_dispatch:

concurrency:
  group: ai-news-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run collector
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_AI_NEWS_DB_ID: ${{ secrets.NOTION_AI_NEWS_DB_ID }}
        run: node scripts/ai-news/collector.mjs
