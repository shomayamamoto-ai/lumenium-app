name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/company-homepage-design-m2cXU
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r index.html members.html member.html assets _site/
          # ensure a root 404 redirects back to index for SPA-ish behavior
          cp _site/index.html _site/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
