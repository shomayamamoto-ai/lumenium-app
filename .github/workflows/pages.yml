name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/company-homepage-design-m2cXU
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          # HTML pages
          cp index.html       _site/
          cp members.html     _site/
          cp member.html      _site/
          cp about.html       _site/
          cp audition.html    _site/
          cp news.html        _site/
          cp privacy.html     _site/
          cp 404.html         _site/
          cp reset.html       _site/
          # Static assets
          cp -r assets        _site/
          # PWA + SEO support files
          cp manifest.json    _site/
          cp sw.js            _site/
          cp sitemap.xml      _site/
          cp robots.txt       _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
