<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — Lumenium</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="theme-color" content="#010104" />
<meta name="robots" content="noindex" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #010104;
    color: #f8fafc;
    font-family: 'Inter Tight', 'Helvetica Neue', system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, #151642 0%, #07081e 55%, #020212 100%);
  }
  .stars { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .star {
    position: absolute; background: #a5b4fc; border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

  .container {
    position: relative; z-index: 10;
    text-align: center; padding: 24px; max-width: 560px;
  }
  .logo {
    width: 120px; height: 120px; margin: 0 auto 36px;
    filter: drop-shadow(0 0 30px rgba(165, 180, 252, 0.6)) drop-shadow(0 0 60px rgba(139, 92, 246, 0.3));
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.5em;
    color: #a5b4fc; text-transform: uppercase; margin-bottom: 16px;
  }
  .code {
    font-size: clamp(88px, 20vw, 200px);
    font-weight: 800; letter-spacing: -0.02em; line-height: 0.85;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #818cf8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 40px rgba(165, 180, 252, 0.3));
    margin-bottom: 12px;
  }
  .msg { font-size: 18px; font-weight: 500; color: #e0e7ff; margin-bottom: 8px; }
  .sub {
    font-size: 13px; letter-spacing: 0.12em;
    color: rgba(248, 250, 252, 0.55); margin-bottom: 36px; line-height: 1.7;
  }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px;
    font-size: 12px; letter-spacing: 0.25em; font-weight: 600;
    font-family: inherit; text-transform: uppercase; text-decoration: none;
    border-radius: 999px; transition: all 0.25s ease; cursor: pointer;
  }
  .btn-primary {
    background: linear-gradient(135deg, #a5b4fc, #818cf8);
    color: #020212; border: none;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(139, 92, 246, 0.5);
  }
  .btn-ghost {
    background: transparent; color: rgba(248, 250, 252, 0.85);
    border: 1px solid rgba(248, 250, 252, 0.25);
  }
  .btn-ghost:hover {
    background: rgba(248, 250, 252, 0.08);
    border-color: rgba(248, 250, 252, 0.45);
    transform: translateY(-2px);
  }

  .scan {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(165, 180, 252, 0.5) 50%, transparent 100%);
    top: 50%;
    animation: scanMove 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scanMove {
    0%   { top: 20%; opacity: 0; }
    30%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { top: 80%; opacity: 0; }
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.7) 100%);
  }

  @media (max-width: 640px) {
    .logo { width: 90px; height: 90px; margin-bottom: 24px; }
    .msg { font-size: 16px; }
    .sub { font-size: 12px; }
    .btn { padding: 12px 22px; font-size: 11px; letter-spacing: 0.2em; }
  }
</style>
</head>
<body>
  <div class="stars" aria-hidden="true" id="stars"></div>
  <div class="scan" aria-hidden="true"></div>
  <div class="container">
    <img src="/favicon.svg" alt="Lumenium" class="logo" width="120" height="120" />
    <p class="eyebrow">Page Not Found</p>
    <h1 class="code">404</h1>
    <p class="msg">このページは見つかりませんでした</p>
    <p class="sub">
      お探しのページは移動または削除された可能性があります。<br />
      トップページに戻るか、以下のミニゲームでひと息どうぞ。
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        トップへ戻る
      </a>
      <a href="/runner.html" class="btn btn-ghost">ランナー</a>
      <a href="/game.html" class="btn btn-ghost">シューティング</a>
      <a href="/racing.html" class="btn btn-ghost">ディフェンス</a>
    </div>
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('span');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.opacity = (Math.random() * 0.6 + 0.3).toFixed(2);
      s.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
      stars.appendChild(s);
    }
  </script>
</body>
</html>
