<script>
// === Sound Engine (8-bit style) ===
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=vol||0.1;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxShoot(){playTone(800,0.05,'square',0.06)}
function sfxHit(){playTone(200,0.1,'sawtooth',0.08)}
function sfxKill(){playTone(600,0.08,'square',0.07);setTimeout(function(){playTone(900,0.1,'square',0.06)},60)}
function sfxPlace(){playTone(400,0.06,'triangle',0.08);setTimeout(function(){playTone(600,0.06,'triangle',0.07)},50)}
function sfxWave(){playTone(300,0.15,'sawtooth',0.06);setTimeout(function(){playTone(500,0.15,'sawtooth',0.05)},100);setTimeout(function(){playTone(700,0.15,'sawtooth',0.04)},200)}

function sfxDamage(){playTone(100,0.15,'square',0.1)}
function sfxCoin(){playTone(1200,0.05,'square',0.05);setTimeout(function(){playTone(1600,0.08,'square',0.04)},40)}

}

function getUpgCost(tw){
  var base=towerTypes[tw.type].cost;
  return Math.floor(base*(tw.level*0.8));
}

function getSellVal(tw){
  var base=towerTypes[tw.type].cost;
  var total=base;
  for(var i=1;i<tw.level;i++)total+=Math.floor(base*(i*0.8));
  return Math.floor(total*0.6);
}

function upgradeTower(){
  if(!selectedTower||st!=='play')return;
  if(selectedTower.level>=5)return;
  var cost=getUpgCost(selectedTower);
  if(gold<cost)return;
  gold-=cost;sfxUpgrade();
  selectedTower.level++;
  updateTowerUI();
}

function sellTower(){

function drawMapPreview(){
  cx.fillStyle='#1a472a';cx.fillRect(0,0,W,H);
  cx.strokeStyle='rgba(255,255,255,0.03)';cx.lineWidth=0.5;
  for(var i=0;i<=COLS;i++){cx.beginPath();cx.moveTo(i*TILE,0);cx.lineTo(i*TILE,H);cx.stroke()}
  for(var j=0;j<=ROWS;j++){cx.beginPath();cx.moveTo(0,j*TILE);cx.lineTo(W,j*TILE);cx.stroke()}
  pathData.forEach(function(p){
    cx.fillStyle='#8B7355';cx.fillRect(p[0]*TILE,p[1]*TILE,TILE,TILE);
    cx.fillStyle='#6B5535';cx.fillRect(p[0]*TILE,p[1]*TILE,TILE,2);cx.fillRect(p[0]*TILE,p[1]*TILE,2,TILE);
  });
  // Preview arrows
  for(var a=0;a<pathData.length-1;a+=3){
    var from=pathData[a],to=pathData[Math.min(a+1,pathData.length-1)];
    var ax=from[0]*TILE+TILE/2,ay=from[1]*TILE+TILE/2;
    var ddx=to[0]-from[0],ddy=to[1]-from[1];
    if(ddx===0&&ddy===0)continue;
    var ang=Math.atan2(ddy,ddx);
    cx.save();cx.translate(ax,ay);cx.rotate(ang);
    cx.fillStyle='rgba(255,255,255,0.2)';
    cx.beginPath();cx.moveTo(7,0);cx.lineTo(-4,-5);cx.lineTo(-4,5);cx.closePath();cx.fill();
    cx.restore();
  }
  cx.fillStyle='#10b981';cx.font='bold 14px Inter';cx.textAlign='center';
  cx.fillText('S',pathData[0][0]*TILE+TILE/2,pathData[0][1]*TILE+TILE/2+5);
  var last=pathData[pathData.length-1];
  cx.fillStyle='#ef4444';cx.fillText('G',last[0]*TILE+TILE/2,last[1]*TILE+TILE/2+5);
}

function spawnWave(){
  wave++;
  if(wave>50){st='clear';score=wave*100+gold;if(score>hi){hi=score;localStorage.setItem('tdHi',hi.toString())}document.getElementById('fs').textContent='ALL CLEAR! Score: '+score;document.getElementById('hs').textContent='BEST: '+hi;if(isT(score)&&score>0){pS=score;document.getElementById('ni').value='';document.getElementById('nm').style.display='flex'}else{document.getElementById('gs').style.display='block';document.querySelector('#gs h2').textContent='🎉 ALL CLEAR!';document.querySelector('#gs h2').style.color='#ffd700';rR()}return}
  noti('Wave '+wave+' 開始!',wave%10===0?'#ef4444':'#10b981');sfxWave();
  if(wave%10===0){noti('⚠️ ボスWave!','#ef4444');sfxBoss()}
  var count=Math.min(6+Math.floor(wave*1.6),45);
  var hp=3+wave*2.6+Math.pow(wave,1.28)*0.28;
  var speed=0.85+Math.min(wave*0.045,1.8);
  var fastChance=Math.min(0.08+wave*0.013,0.4);
  var bossChance=wave>6?Math.min(0.04+wave*0.007,0.2):0;
  spawnQueue=[];

  // Boss waves: only 2-3 bosses, not all bosses
  var bossCount=0;
  var maxBosses=wave%10===0?Math.min(2+Math.floor(wave/20),5):99;

  for(var i=0;i<count;i++){
    var type='normal';
    if(wave%10===0&&bossCount<maxBosses){type='boss';bossCount++}
    else if(wave%5===0&&Math.random()<0.4)type='fast';
    else if(Math.random()<bossChance&&bossCount<maxBosses){type='boss';bossCount++}
    else if(Math.random()<fastChance)type='fast';

    // New types after certain waves
    if(wave>8&&type==='normal'&&Math.random()<0.12)type='healer';
    if(wave>15&&type==='normal'&&Math.random()<0.08)type='shield';

    var e={pathIdx:0,x:pathData[0][0]*TILE+TILE/2,y:pathData[0][1]*TILE+TILE/2,hp:hp,maxHp:hp,speed:speed,slow:0,alive:true,type:type,healTimer:0};
    if(type==='fast'){e.speed*=1.75;e.hp*=0.55;e.maxHp=e.hp}
    if(type==='boss'){e.hp*=3.2+wave*0.22;e.maxHp=e.hp;e.speed*=0.4}
    if(type==='healer'){e.healTimer=75;e.hp*=0.85;e.maxHp=e.hp}
    if(type==='shield'){e.hp*=2.2;e.maxHp=e.hp;e.speed*=0.85}
    spawnQueue.push({e:e,delay:i*Math.max(8,20-wave*0.25)});
  }
  gold+=wave<15?40+wave*5:20+wave*3;
}

function gameOver(){
  st='over';stopBGM();sfxDamage();

  if(score>hi){hi=score;localStorage.setItem('tdHi',hi.toString())}
  document.getElementById('fs').textContent='Wave '+wave+' | Score: '+score;
  document.getElementById('hs').textContent='BEST: '+hi;
  if(isT(score)&&score>0){pS=score;document.getElementById('ni').value='';document.getElementById('nm').style.display='flex';setTimeout(function(){document.getElementById('ni').focus()},100)}

}

function explode(x,y,c,n){for(var i=0;i<(n||8);i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*10,ml:25,c:c,sz:2+Math.random()*2})}}

function update(){
  if(st!=='play')return;
  if(freezeF>0){freezeF--;return}
  if(window.towerBoost>0){window.towerBoost--;if(window.towerBoost===0)noti('⚔️ タワー強化 終了','#94a3b8')}
  if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=0}
  notifications2.forEach(function(n){n.life--});
  notifications2=notifications2.filter(function(n){return n.life>0});

  // Wave spawning
  if(spawnQueue.length===0&&enemies.filter(function(e){return e.alive}).length===0){
    waveTimer--;
    if(waveTimer<=0){spawnWave();waveTimer=Math.max(90,180-wave*2)}
  }

  // Spawn from queue
  spawnQueue=spawnQueue.filter(function(sq){
    sq.delay--;
    if(sq.delay<=0){enemies.push(sq.e);return false}
    return true;
  });

  // Move enemies
  enemies.forEach(function(en){
    if(!en.alive)return;
    if(en.slow>0)en.slow--;
    // Poison tick damage
    if(en.poison>0){en.poison--;if(en.poison%15===0){en.hp-=0.5;explode(en.x,en.y,'#10b981',2);if(en.hp<=0){en.alive=false;combo++;comboTimer=60;totalKills2++;score+=10*Math.min(combo,30);gold+=(wave<10?8:5)*(window.goldRush?3:1);sfxKill()}}}
    // Healer: heals nearby enemies
    if(en.type==='healer'){
      en.healTimer--;
      if(en.healTimer<=0){
        en.healTimer=90;
        enemies.forEach(function(en2){
          if(!en2.alive||en2===en)return;
          var d=Math.sqrt((en2.x-en.x)*(en2.x-en.x)+(en2.y-en.y)*(en2.y-en.y));
          if(d<60){en2.hp=Math.min(en2.maxHp,en2.hp+en2.maxHp*0.15);explode(en2.x,en2.y,'#10b981',3)}
        });
      }
    }
    var spd=en.speed*(en.slow>0?0.4:1);
    var target=pathData[en.pathIdx+1];
    if(!target){en.alive=false;lives--;if(lives<=0)gameOver();return}
    var tx=target[0]*TILE+TILE/2,ty=target[1]*TILE+TILE/2;
    var dx=tx-en.x,dy=ty-en.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<spd+1){en.pathIdx++;en.x=tx;en.y=ty}
    else{en.x+=dx/d*spd;en.y+=dy/d*spd}
  });

  // Update tower UI
  updateTowerUI();

  // Tower shooting
  towers.forEach(function(tw){
    if(tw.cooldown>0){tw.cooldown--;return}
    var tt=towerTypes[tw.type];
    var lvl=tw.level||1;
    var range=tt.range+lvl*10;
    var dmg=tt.dmg*(1+(lvl-1)*0.6)*(window.towerBoost>0?1.5:1);
    var rate=Math.max(tt.rate-lvl*4,4);
    var target=null,minDist=range;
    enemies.forEach(function(en){
      if(!en.alive)return;
      var d=Math.sqrt((en.x-tw.x)*(en.x-tw.x)+(en.y-tw.y)*(en.y-tw.y));
      if(d<minDist){minDist=d;target=en}
    });
    if(target){
      tw.cooldown=rate;
      tw.angle=Math.atan2(target.y-tw.y,target.x-tw.x);
      if(tt.laser){
        target.hp-=dmg;
        if(tt.slow)target.slow=60+lvl*10;
        bullets.push({x:tw.x,y:tw.y,tx:target.x,ty:target.y,life:6,col:tt.bullet,laser:true});
        if(target.hp<=0){target.alive=false;combo++;comboTimer=60;totalKills2++;score+=10*Math.min(combo,30);gold+=(wave<10?8:5)*(window.goldRush?3:1);explode(target.x,target.y,'#fde047',target.type==='boss'?25:10);sfxKill();
          if(target.type==='boss'){freezeF=8;noti('💀 ボス撃破!','#ffd700');sfxBoss()}
          if(combo>=5)ach('c5','5連続撃破!');if(combo>=10)ach('c10','10連続!');if(totalKills2>=100)ach('k100','100体撃破!')}
      } else if(tt.chain){
        // Chain lightning — bounces to up to N nearby enemies
        var chainDmg=dmg;
        var chainHit=[target];
        var chainPrev=target;
        for(var ch=0;ch<(tt.chain||3)+Math.floor(lvl/2);ch++){
          chainPrev.hp-=chainDmg;
          bullets.push({x:(ch===0?tw.x:chainPrev.prevX||tw.x),y:(ch===0?tw.y:chainPrev.prevY||tw.y),tx:chainPrev.x,ty:chainPrev.y,life:8,col:tt.bullet,laser:true});
          if(chainPrev.hp<=0){chainPrev.alive=false;combo++;comboTimer=60;totalKills2++;score+=10*Math.min(combo,30);gold+=(wave<10?8:5)*(window.goldRush?3:1);explode(chainPrev.x,chainPrev.y,'#d8b4fe',chainPrev.type==='boss'?25:8);sfxKill();
            if(chainPrev.type==='boss'){freezeF=8;noti('💀 ボス撃破!','#ffd700');sfxBoss()}}
          // Find next nearest within 70 range that wasn't hit
          var next=null, nd=70;
          enemies.forEach(function(en){
            if(!en.alive||chainHit.indexOf(en)>=0)return;
            var d2=Math.sqrt((en.x-chainPrev.x)*(en.x-chainPrev.x)+(en.y-chainPrev.y)*(en.y-chainPrev.y));
            if(d2<nd){nd=d2;next=en}
          });
          if(!next)break;
          next.prevX=chainPrev.x;next.prevY=chainPrev.y;
          chainHit.push(next);chainPrev=next;chainDmg*=0.75;
        }
      } else {
        bullets.push({x:tw.x,y:tw.y,vx:Math.cos(tw.angle)*5,vy:Math.sin(tw.angle)*5,dmg:dmg,col:tt.bullet,splash:tt.splash?tt.splash+lvl*5:0,slow:tt.slow||false,poison:tt.poison||false,life:60});
      }
    }
  });

  // Move bullets
  bullets.forEach(function(b){
    if(b.laser){b.life--;return}
    b.x+=b.vx;b.y+=b.vy;b.life--;
    enemies.forEach(function(en){
      if(!en.alive)return;
      if(Math.abs(b.x-en.x)<12&&Math.abs(b.y-en.y)<12){
        en.hp-=b.dmg;
        if(b.slow)en.slow=90;
        if(b.poison)en.poison=90;
        if(b.splash>0){
          enemies.forEach(function(en2){
            if(!en2.alive||en2===en)return;
            if(Math.sqrt((en2.x-b.x)*(en2.x-b.x)+(en2.y-b.y)*(en2.y-b.y))<b.splash){en2.hp-=b.dmg*0.5}
          });
          explode(b.x,b.y,'#fca5a5',12);
        }
        b.life=0;
        if(en.hp<=0){en.alive=false;combo++;comboTimer=60;totalKills2++;score+=10*Math.min(combo,30);gold+=(wave<10?8:5)*(window.goldRush?3:1);explode(en.x,en.y,'#ef4444',en.type==='boss'?25:8);sfxKill();
          if(en.type==='boss'){freezeF=8;noti('💀 ボス撃破!','#ffd700');sfxBoss()}
          if(combo>=5)ach('c5','5連続撃破!');if(combo>=10)ach('c10','10連続!');if(totalKills2>=100)ach('k100','100体撃破!')}
      }
    });
  });
  bullets=bullets.filter(function(b){return b.life>0});
  enemies=enemies.filter(function(en){return en.alive||en.pathIdx<pathData.length-1});

  particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.life--});
  particles=particles.filter(function(p){return p.life>0});
}

function draw(){
  // Grass background
  cx.fillStyle='#1a472a';cx.fillRect(0,0,W,H);

  // Grid subtle
  cx.strokeStyle='rgba(255,255,255,0.03)';cx.lineWidth=0.5;
  for(var i=0;i<=COLS;i++){cx.beginPath();cx.moveTo(i*TILE,0);cx.lineTo(i*TILE,H);cx.stroke()}
  for(var j=0;j<=ROWS;j++){cx.beginPath();cx.moveTo(0,j*TILE);cx.lineTo(W,j*TILE);cx.stroke()}

  // Path
  pathData.forEach(function(p){
    cx.fillStyle='#8B7355';cx.fillRect(p[0]*TILE,p[1]*TILE,TILE,TILE);
    // Path border
    cx.fillStyle='#6B5535';
    cx.fillRect(p[0]*TILE,p[1]*TILE,TILE,2);
    cx.fillRect(p[0]*TILE,p[1]*TILE,2,TILE);
  });

  // Direction arrows on path
  for(var a=0;a<pathData.length-1;a+=4){
    var from=pathData[a],to=pathData[Math.min(a+1,pathData.length-1)];
    var ax=from[0]*TILE+TILE/2,ay=from[1]*TILE+TILE/2;
    var dx=to[0]-from[0],dy=to[1]-from[1];
    if(dx===0&&dy===0)continue;
    var angle=Math.atan2(dy,dx);
    cx.save();cx.translate(ax,ay);cx.rotate(angle);
    cx.fillStyle='rgba(255,255,255,0.15)';
    cx.beginPath();cx.moveTo(6,0);cx.lineTo(-4,-4);cx.lineTo(-4,4);cx.closePath();cx.fill();
    cx.restore();
  }

  // Start/End markers
  cx.fillStyle='#10b981';cx.font='bold 12px Inter';cx.textAlign='center';
  var sp=pathData[0];
  cx.beginPath();cx.arc(sp[0]*TILE+TILE/2,sp[1]*TILE+TILE/2,10,0,Math.PI*2);cx.fillStyle='rgba(16,185,129,0.3)';cx.fill();
  cx.fillStyle='#10b981';cx.fillText('S',sp[0]*TILE+TILE/2,sp[1]*TILE+TILE/2+4);
  var last=pathData[pathData.length-1];
  cx.beginPath();cx.arc(last[0]*TILE+TILE/2,last[1]*TILE+TILE/2,10,0,Math.PI*2);cx.fillStyle='rgba(239,68,68,0.3)';cx.fill();
  cx.fillStyle='#ef4444';cx.fillText('G',last[0]*TILE+TILE/2,last[1]*TILE+TILE/2+4);

  // Towers
  towers.forEach(function(tw){
    var tt=towerTypes[tw.type];
    // Base
    cx.fillStyle='#333';cx.beginPath();cx.arc(tw.x,tw.y,10,0,Math.PI*2);cx.fill();
    // Tower
    cx.fillStyle=tt.col;cx.beginPath();cx.arc(tw.x,tw.y,8,0,Math.PI*2);cx.fill();
    // Barrel
    cx.strokeStyle=tt.col;cx.lineWidth=3;
    cx.beginPath();cx.moveTo(tw.x,tw.y);
    cx.lineTo(tw.x+Math.cos(tw.angle)*14,tw.y+Math.sin(tw.angle)*14);cx.stroke();
    // Icon
    cx.font='10px Inter';cx.textAlign='center';cx.fillStyle='#fff';
    var icons=['🔫','❄️','💥','⚡','🧪','🎯','🔗'];
    cx.fillText(icons[tw.type]||'❓',tw.x,tw.y+4);
    // Level badge
    var lvl2=tw.level||1;
    if(lvl2>1){
      cx.fillStyle='#ffd700';cx.font='bold 8px Inter';
      cx.fillText('Lv'+lvl2,tw.x,tw.y-12);
    }
    // Selected highlight
    if(tw===selectedTower){
      cx.strokeStyle='#ffd700';cx.lineWidth=2;cx.setLineDash([3,3]);
      cx.beginPath();cx.arc(tw.x,tw.y,(towerTypes[tw.type].range+(lvl2||1)*8),0,Math.PI*2);cx.stroke();
      cx.setLineDash([]);
      cx.strokeStyle='#ffd700';cx.lineWidth=2;
      cx.beginPath();cx.arc(tw.x,tw.y,12,0,Math.PI*2);cx.stroke();
    }
  });

  // Enemies
  enemies.forEach(function(en){
    if(!en.alive)return;
    var sz=en.type==='boss'?14:en.type==='fast'?8:10;
    // Shadow
    cx.fillStyle='rgba(0,0,0,0.2)';cx.beginPath();cx.ellipse(en.x,en.y+sz+2,sz,3,0,0,Math.PI*2);cx.fill();
    // Body
    var eCol=en.type==='boss'?'#dc2626':en.type==='fast'?'#f59e0b':en.type==='healer'?'#10b981':en.type==='shield'?'#6366f1':'#ef4444';
    cx.fillStyle=eCol;
    cx.beginPath();cx.arc(en.x,en.y,sz,0,Math.PI*2);cx.fill();
    // Eyes
    cx.fillStyle='#fff';
    cx.beginPath();cx.arc(en.x-3,en.y-2,3,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(en.x+3,en.y-2,3,0,Math.PI*2);cx.fill();
    cx.fillStyle='#000';
    cx.beginPath();cx.arc(en.x-2,en.y-1,1.5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(en.x+4,en.y-1,1.5,0,Math.PI*2);cx.fill();
    // HP bar
    var bw=sz*2;
    cx.fillStyle='#333';cx.fillRect(en.x-bw/2,en.y-sz-6,bw,3);
    cx.fillStyle=en.hp/en.maxHp>0.5?'#10b981':'#ef4444';
    cx.fillRect(en.x-bw/2,en.y-sz-6,bw*(en.hp/en.maxHp),3);
    // Slow effect
    if(en.slow>0){cx.strokeStyle='#67e8f9';cx.lineWidth=1;cx.beginPath();cx.arc(en.x,en.y,sz+3,0,Math.PI*2);cx.stroke()}
    // Healer aura
    if(en.type==='healer'){cx.strokeStyle='rgba(16,185,129,0.4)';cx.lineWidth=1;cx.setLineDash([3,3]);cx.beginPath();cx.arc(en.x,en.y,sz+8,0,Math.PI*2);cx.stroke();cx.setLineDash([]);cx.fillStyle='#fff';cx.font='bold 8px Inter';cx.textAlign='center';cx.fillText('+',en.x,en.y+3)}
    // Poison effect
    if(en.poison>0){cx.strokeStyle='rgba(16,185,129,0.5)';cx.lineWidth=1;cx.beginPath();cx.arc(en.x,en.y,sz+5,0,Math.PI*2);cx.stroke();cx.fillStyle='#10b981';cx.font='bold 7px Inter';cx.textAlign='center';cx.fillText('☠',en.x,en.y-sz-4)}
    // Shield glow
    if(en.type==='shield'){cx.strokeStyle='rgba(99,102,241,0.5)';cx.lineWidth=2;cx.beginPath();cx.arc(en.x,en.y,sz+4,0,Math.PI*2);cx.stroke();cx.fillStyle='#fff';cx.font='bold 7px Inter';cx.textAlign='center';cx.fillText('🛡',en.x,en.y+3)}
  });

  // Bullets
  bullets.forEach(function(b){
    if(b.laser){
      cx.strokeStyle=b.col;cx.lineWidth=2;cx.globalAlpha=b.life/6;
      cx.beginPath();cx.moveTo(b.x,b.y);cx.lineTo(b.tx,b.ty);cx.stroke();
      cx.globalAlpha=1;
    } else {
      cx.fillStyle=b.col;cx.beginPath();cx.arc(b.x,b.y,3,0,Math.PI*2);cx.fill();
    }
  });

  // Particles
  particles.forEach(function(p){var a=p.life/p.ml;cx.globalAlpha=a;cx.fillStyle=p.c;cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz)});
  cx.globalAlpha=1;

  // HUD
  cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.roundRect(8,8,200,56,8);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 13px Inter';cx.textAlign='left';
  cx.fillText('Wave: '+wave+'  |  Score: '+score,18,26);
  cx.fillStyle='#ffd700';cx.fillText('💰 '+gold,18,44);
  cx.fillStyle='#ef4444';cx.fillText('❤️ '+lives,100,44);

  // Combo
  if(combo>1){cx.textAlign='center';cx.fillStyle=combo>=20?'rgba(239,68,68,'+Math.min(1,comboTimer/15)+')':combo>=10?'rgba(168,85,247,'+Math.min(1,comboTimer/15)+')':'rgba(234,179,8,'+Math.min(1,comboTimer/15)+')';cx.font='bold '+Math.min(14+combo,36)+'px Inter';cx.fillText('x'+combo+' COMBO'+(combo>=10?' 🔥':'')+(combo>=20?' 💀':''),W/2,70)}

  // Notifications
  notifications2.forEach(function(n,i){var a=Math.min(1,n.life/12);cx.globalAlpha=a;cx.fillStyle=n.color;cx.font='bold 13px Inter';cx.textAlign='center';cx.fillText(n.text,W/2,H/2-20-i*20-(n.ml-n.life)*0.3)});
  cx.globalAlpha=1;

  // Map name
  var mapNames=['S字','コの字','ジグザグ','L字','階段'];
  cx.fillStyle='rgba(0,0,0,0.5)';cx.beginPath();cx.roundRect(W-100,8,90,20,6);cx.fill();
  cx.fillStyle='#a5b4fc';cx.font='bold 11px Inter';cx.textAlign='center';
  cx.fillText('MAP: '+mapNames[currentMap],W-55,22);

  // Wave incoming
  if(spawnQueue.length===0&&enemies.length===0&&st==='play'){
    cx.fillStyle='rgba(0,0,0,0.4)';cx.beginPath();cx.roundRect(W/2-80,H/2-16,160,32,8);cx.fill();
    cx.fillStyle='#ffd700';cx.font='bold 14px Inter';cx.textAlign='center';
    cx.fillText('Wave '+(wave+1)+' coming...',W/2,H/2+5);
  }
}

var gameSpeed=1; // 1 = normal, 2 = 2x, 3 = 3x
function toggleSpeed(){
  gameSpeed=gameSpeed===1?2:gameSpeed===2?3:1;
  var btn=document.getElementById('ff-btn');
  if(btn){btn.textContent='⏩ '+gameSpeed+'x';btn.classList.toggle('sel',gameSpeed>1)}
  noti('⏩ Speed '+gameSpeed+'x',gameSpeed===1?'#94a3b8':'#ffd700');
}
function loop(){
  for(var _s=0;_s<gameSpeed;_s++) update();
  draw();
  requestAnimationFrame(loop);
}
loadMap(0);drawMapPreview();
loop();

function resize(){
  var maxH = window.innerHeight - 200;  // leave space for tower-bar + header + ranking
  var maxW = Math.min(window.innerWidth - 24, 1100);
  var ratio = W / H;  // 560/420 ≈ 1.33
  var ch = maxH;
  var cw = ch * ratio;
  if (cw > maxW) { cw = maxW; ch = cw / ratio; }
  cv.style.width = cw + 'px';
  cv.style.height = ch + 'px';
}
window.addEventListener('resize',resize);resize();
window.addEventListener('keydown',function(e){
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
  if(st!=='play')return;
  if(e.key==='f'||e.key==='F'){toggleSpeed();e.preventDefault()}
});

// Ranking
function gR(){try{return JSON.parse(localStorage.getItem('tdRk')||'[]')}catch(e){return[]}}
function sR(r){localStorage.setItem('tdRk',JSON.stringify(r.slice(0,10)))}
function isT(s){var r=gR();return r.length<10||s>r[r.length-1].score}
var pS=0;
function subN(){var n=(document.getElementById('ni').value||'').trim()||'Anonymous';document.getElementById('nm').style.display='none';var r=gR();r.push({name:n,score:pS});r.sort(function(a,b){return b.score-a.score});sR(r.slice(0,10));rR(pS);document.getElementById('gs').style.display='block'}
function rR(hl){var r=gR(),l=document.getElementById('rl');if(!r.length){l.innerHTML='<li class="rp-i"><span class="rp-r">-</span><span class="rp-n">記録なし</span><span class="rp-s"></span></li>';return}l.innerHTML=r.map(function(x,i){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);return'<li class="rp-i '+(hl&&x.score===hl?'nw':'')+'"><span class="rp-r">'+m+'</span><span class="rp-n">'+x.name+'</span><span class="rp-s">'+x.score.toLocaleString()+'</span></li>'}).join('')}
rR();
var ni=document.getElementById('ni');
ni.addEventListener('focus',function(){inputF=true});
ni.addEventListener('blur',function(){inputF=false});
ni.addEventListener('keydown',function(e){if(e.key==='Enter')subN()});
</script>
