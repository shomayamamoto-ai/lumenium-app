<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Lumenium — キャッシュを復旧中</title>
    <style>
      html, body { margin: 0; padding: 0; background: #05060a; color: #f5f1e6;
        font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        min-height: 100vh; display: grid; place-items: center; text-align: center; }
      .box { padding: 2rem; max-width: 520px; }
      h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.08em; color: #c7d2fe; margin: 0 0 1rem; }
      p  { font-size: 0.95rem; line-height: 1.7; color: #d7d1c1; margin: 0.4rem 0; }
      .spin { width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid rgba(199,210,254,0.2); border-top-color: #6366f1;
        animation: sp 0.9s linear infinite; margin: 0 auto 1.2rem; }
      @keyframes sp { to { transform: rotate(360deg); } }
      a { color: #a5b4fc; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spin" aria-hidden="true"></div>
      <h1>LUMENIUM · RESET</h1>
      <p>古いキャッシュを破棄しています…</p>
      <p>数秒以内にトップページへ戻ります。</p>
      <p><small>移動しない場合は <a href="/?_heal=manual">こちら</a> を押してください。</small></p>
    </div>
    <script>
      (async function(){
        var DONE = false;
        function go() {
          if (DONE) return; DONE = true;
          try {
            var url = '/?_heal=' + Date.now();
            window.location.replace(url);
          } catch (e) { window.location.href = '/'; }
        }
        // Hard-timeout — no matter what, redirect after 2.5s.
        setTimeout(go, 2500);

        try {
          // 1. Unregister every service worker.
          if ('serviceWorker' in navigator) {
            try {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r){
                try { return r.unregister(); } catch (e) { return null; }
              }));
            } catch (e) {}
          }
          // 2. Purge every CacheStorage entry.
          if (window.caches && caches.keys) {
            try {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k){
                try { return caches.delete(k); } catch (e) { return null; }
              }));
            } catch (e) {}
          }
          // 3. Wipe local/session storage so the shell script treats us as fresh.
          try { localStorage.clear(); } catch (e) {}
          try { sessionStorage.clear(); } catch (e) {}
          // 4. Best-effort cookie clear (for this exact path).
          try {
            document.cookie.split(';').forEach(function(c){
              var eq = c.indexOf('=');
              var name = (eq > -1 ? c.substr(0, eq) : c).trim();
              if (name) document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
            });
          } catch (e) {}
        } finally {
          // Give the unregister() promises a tick to commit.
          setTimeout(go, 200);
        }
      })();
    </script>
  </body>
</html>
