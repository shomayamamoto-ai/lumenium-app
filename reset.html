<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="robots" content="noindex">
<title>キャッシュをリセット — AdvoVisions</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a1260;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
  .box{max-width:480px}
  h1{font-size:22px;margin:0 0 12px;font-weight:600;letter-spacing:.04em}
  p{font-size:14px;line-height:1.8;color:rgba(255,255,255,.75);margin:0 0 18px}
  #status{font-family:"SF Mono",Menlo,monospace;font-size:12px;color:#5aa9ff;margin:18px 0;padding:12px;background:rgba(255,255,255,.06);border-radius:8px;text-align:left;white-space:pre-line;min-height:80px}
  a.btn{display:inline-block;padding:12px 28px;background:#fff;color:#0a1260;text-decoration:none;border-radius:100px;font-weight:600;letter-spacing:.05em;margin-top:12px}
</style>
</head>
<body>
  <div class="box">
    <h1>キャッシュをリセット中…</h1>
    <p>このページは古いブラウザキャッシュをクリアし、最新のサイトを表示するためのものです。完了すると自動でトップへ戻ります。</p>
    <div id="status">準備中…</div>
    <a class="btn" href="index.html?nocache=1" id="goto">トップへ戻る</a>
  </div>
  <script>
    var log = function(msg){
      var el = document.getElementById("status");
      el.textContent += "\n" + msg;
    };
    document.getElementById("status").textContent = "リセット開始…";

    (async function(){
      var done = 0;
      try {
        if ("serviceWorker" in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          log("登録されている Service Worker: " + regs.length + " 個");
          for (var r of regs) {
            try { await r.unregister(); done++; } catch(e){}
          }
          log("Service Worker を削除しました (" + done + "件)");
        } else {
          log("Service Worker サポートなし — スキップ");
        }
      } catch(e) { log("SW 削除エラー: " + e.message); }

      try {
        if ("caches" in window) {
          var keys = await caches.keys();
          log("キャッシュ ストア: " + keys.length + " 個");
          for (var k of keys) {
            try { await caches.delete(k); } catch(e){}
          }
          log("全キャッシュを削除しました");
        }
      } catch(e) { log("キャッシュ削除エラー: " + e.message); }

      try { localStorage.clear(); log("localStorage をクリア"); } catch(e){}
      try { sessionStorage.clear(); log("sessionStorage をクリア"); } catch(e){}

      log("\n✓ 完了。3 秒後にトップへ移動します。");

      setTimeout(function(){
        location.replace("index.html?fresh=" + Date.now());
      }, 3000);
    })();
  </script>
</body>
</html>
